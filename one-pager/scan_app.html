<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="scan_app.css" rel="stylesheet">
    <title>Camera App</title>
</head>
<body>
    <h1>Camera App</h1>

    <div id="languageSwitcher" style="margin-bottom: 16px;">
        <button id="langBtnEN">English</button>
        <button id="langBtnNL">Nederlands</button>
    </div>

    <video id="video" autoplay></video>
    <br>
    <button id="captureBtn">Take Picture</button>
    <button id="confirmBtn" style="display: none;">Confirm Upload</button>
    <button id="retakeBtn" style="display: none;">Retake</button>
    <br>
    <canvas id="canvas"></canvas>
    <img id="capturedImage" style="display: none;" alt="Captured Image">

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const captureBtn = document.getElementById('captureBtn');
        const confirmBtn = document.getElementById('confirmBtn');
        const retakeBtn = document.getElementById('retakeBtn');
        const capturedImage = document.getElementById('capturedImage');
        const langBtnEN = document.getElementById('langBtnEN');
        const langBtnNL = document.getElementById('langBtnNL');

        // variables in de twee verschillende talen
        const translations = {
            en: {
                title: 'Camera App',
                capture: 'Take Picture',
                confirm: 'Confirm picture',
                retake: 'Retake'
            },
            nl: {
                title: 'Camera App',
                capture: 'Maak foto',
                confirm: 'Bevestig foto',
                retake: 'Opnieuw maken'
            }
        };

        // default language
        let currentLanguage = 'en';

        function setLanguage(lang) {
            currentLanguage = lang;
            const text = translations[lang];
            document.querySelector('h1').textContent = text.title;
            captureBtn.textContent = text.capture;
            confirmBtn.textContent = text.confirm;
            retakeBtn.textContent = text.retake;
        }

        langBtnEN.addEventListener('click', () => setLanguage('en'));
        langBtnNL.addEventListener('click', () => setLanguage('nl'));

        setLanguage(currentLanguage);

        // bewaar de laatste gemaakte foto totdat de gebruiker bevestigt
        let currentBlob = null;

        function showCaptureControls() {
            capturedImage.style.display = 'none';
            video.style.display = 'block';
            captureBtn.style.display = 'inline';
            confirmBtn.style.display = 'none';
            retakeBtn.style.display = 'none';
            currentBlob = null;
        }

        // de knoppen om de foto te bevestigen of opnieuw te maken
        function showReviewButtons() {
            confirmBtn.style.display = 'inline';
            retakeBtn.style.display = 'inline';
            captureBtn.style.display = 'none';
        }

        // Upload de foto pas als de gebruiker heeft bevestigd
        async function uploadPhoto(blob) {
            if (!blob) {
                return;
            }

            // maak upload objects
            const formData = new FormData();
            // voeg bestand toe
            formData.append(
                'file', // naam van veld
                blob, // de afbeelding
                'photo.png' // bestandsnaam             
                );

            try {
                // stuur naar de api
                const response = await fetch(
                    'https://raspberrypi.tail1480d1.ts.net/api/upload',
                    {
                        method: 'POST',
                        body: formData
                    }
                );

                if (!response.ok) {
                    console.error('Upload failed:', response.status, response.statusText);
                } else {
                    console.log('Verstuurd!');
                }
            } catch (err) {
                console.error('Fout bij upload:', err);
            }
        }

        // vraag toestemming om de camera te gebruiken
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' }
        })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            console.error('Error accessing camera:', err);
            alert('Unable to access camera.');
        });

        // maakt een foto
        captureBtn.addEventListener('click', async () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            ctx.drawImage(video, 0, 0);

            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
            currentBlob = blob;

            capturedImage.src = canvas.toDataURL('image/png');
            capturedImage.style.display = 'block';

            video.style.display = 'none';
            showReviewButtons();
        });

        // Upload de foto als de gebruiker akkoord is
        confirmBtn.addEventListener('click', async () => {
            if (!currentBlob) {
                return;
            }

            await uploadPhoto(currentBlob);
            showCaptureControls();
        });

        // zet de app terug om opnieuw te maken
        retakeBtn.addEventListener('click', () => {
            showCaptureControls();
        });
    </script>

</body>
</html>
