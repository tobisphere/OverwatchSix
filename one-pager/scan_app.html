<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="scan_app.css" rel="stylesheet">
    <title>Camera App</title>
</head>
<body>
    <h1>Camera App</h1>
    <video id="video" autoplay></video>
    <br>
    <button id="captureBtn">Take Picture</button>
    <button id="replaceBtn" style="display: none;">Replace Last Photo</button>
    <button id="addBtn" style="display: none;">Add Another Photo</button>
    <br>
    <p id="queueInfo">Upload queue: 0 / 10</p>
    <canvas id="canvas"></canvas>
    <img id="capturedImage" style="display: none;" alt="Captured Image">

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const captureBtn = document.getElementById('captureBtn');
        const capturedImage = document.getElementById('capturedImage');
        const replaceBtn = document.getElementById('replaceBtn');
        const addBtn = document.getElementById('addBtn');
        const queueInfo = document.getElementById('queueInfo');

        const maxQueueSize = 10; // pas dit getal aan voor een andere queue lengte
        const uploadQueue = [];
        let pendingReplace = false;

        function showCaptureControls() {
            capturedImage.style.display = 'none';
            video.style.display = 'block';
            captureBtn.style.display = 'inline';
            replaceBtn.style.display = 'none';
            addBtn.style.display = 'none';
        }

        function showActionButtons() {
            replaceBtn.style.display = 'inline';
            addBtn.style.display = 'inline';
            captureBtn.style.display = 'none';
        }

        function setPendingReplace(replaceMode) {
            pendingReplace = replaceMode;
            showCaptureControls();
        }

        function updateQueueInfo() {
            queueInfo.textContent = `Upload queue: ${uploadQueue.length} / ${maxQueueSize}`;
        }

        function addToQueue(blob) {
            if (!blob) {
                console.error('Geen blob ontvangen om toe te voegen aan de queue.');
                return;
            }

            if (uploadQueue.length >= maxQueueSize) {
                uploadQueue.shift();
                console.log('Oudste foto uit queue verwijderd om ruimte te maken.');
            }

            uploadQueue.push(blob);
            updateQueueInfo();
        }

        function replaceLastPhoto(blob) {
            if (uploadQueue.length > 0) {
                uploadQueue.pop();
                console.log('Laatste foto uit queue verwijderd om te vervangen.');
            }
            addToQueue(blob);
        }

        async function uploadPhoto(blob) {
            if (!blob) {
                return;
            }

            // maak upload objects
            const formData = new FormData();
            // voeg bestand toe
            formData.append(
                'file', // naam van veld
                blob, // de afbeelding
                'photo.png' // bestandsnaam             
                );

            try {
                // stuur naar de api
                const response = await fetch(
                    'https://raspberrypi.tail1480d1.ts.net/api/upload', 
                    {
                    method: 'POST',
                    body: formData
                    }
                );

                if (!response.ok) {
                    console.error('Upload failed:', response.status, response.statusText);
                } else {
                    console.log('Verstuurd!');
                }
            } catch (err) {
                console.error('Fout bij upload:', err);
            }
        }

        navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' }
        })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            console.error('Error accessing camera:', err);
            alert('Unable to access camera.');
        });

        captureBtn.addEventListener('click', async () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            ctx.drawImage(video, 0, 0);

            capturedImage.src = canvas.toDataURL('image/png');
            capturedImage.style.display = 'block';

            video.style.display = 'none';
            showActionButtons();

            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
            if (pendingReplace) {
                replaceLastPhoto(blob);
                pendingReplace = false;
            } else {
                addToQueue(blob);
            }

            await uploadPhoto(blob);
        });

        replaceBtn.addEventListener('click', () => setPendingReplace(true));
        addBtn.addEventListener('click', () => setPendingReplace(false));
    </script>

</body>
</html>
